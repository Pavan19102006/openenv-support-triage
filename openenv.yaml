name: ticket-triage
version: 1.0.0
description: >
  Customer support ticket triage environment. An AI agent must categorize,
  prioritize, respond to, escalate, and close support tickets across
  varying difficulty levels.
tasks:
  - task_easy
  - task_medium
  - task_hard
metrics:
  - current_score
  - episode_reward
api:
  baseUrl: http://localhost:8000
  endpoints:
    reset: /reset
    step: /step
    state: /state
    health: /health
models:
  action: server.models.Action
  observation: server.models.Observation
  state: server.models.State
